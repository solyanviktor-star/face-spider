<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Spider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; touch-action: none; }
    video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    #buttons {
      position: absolute; bottom: 20px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px;
      z-index: 10; flex-wrap: wrap; padding: 0 10px;
    }
    button {
      background: rgba(0,255,255,0.2); color: #0ff; border: 1px solid #0ff;
      padding: 10px 16px; border-radius: 8px; font-size: 16px;
      font-family: monospace; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    button:active { background: rgba(0,255,255,0.5); }
    #status {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      color: #0f0; font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 8px;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">starting...</div>
  <div id="buttons">
    <button onclick="cmd('up')">↑ Up</button>
    <button onclick="cmd('left')">← Left</button>
    <button onclick="cmd('right')">Right →</button>
    <button onclick="cmd('down')">↓ Down</button>
    <button onclick="cmd('dance')">♪ Dance</button>
    <button onclick="cmd('spin')">↻ Spin</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/vision_bundle.mjs" type="module"></script>

  <script type="module">
    const { FaceLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/vision_bundle.mjs');

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    const SPIDER_SIZE = 55;
    const MOVE_SPEED = 0.1;

    const ZONES = { center: 1, up: 10, down: 152, left: 234, right: 454 };

    let spiderX = 0, spiderY = 0, targetX = 0, targetY = 0;
    let legFrame = 0, legTimer = 0, isMoving = false;
    let isDancing = false, danceTimer = 0;
    let isSpinning = false, spinAngle = 0;
    let lastTime = 0, w = 0, h = 0;
    let faceLandmarker = null, landmarks = null;
    let currentZone = 'center';

    function getLM(i) {
      if (!landmarks || !landmarks[0]) return null;
      const lm = landmarks[0][i];
      return lm ? { x: lm.x * w, y: lm.y * h } : null;
    }

    window.cmd = function(action) {
      isDancing = false; isSpinning = false;
      if (action === 'dance') { isDancing = true; danceTimer = 0; }
      else if (action === 'spin') { isSpinning = true; spinAngle = 0; }
      else { currentZone = action; }
    };

    function drawSpider(x, y, angle, frame) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      const half = SPIDER_SIZE / 2;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(3, 5, half * 0.5, half * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();

      // Abdomen
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.ellipse(0, half * 0.1, half * 0.45, half * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.ellipse(0, half * 0.18, half * 0.08, half * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(0, -half * 0.3, half * 0.32, half * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#ff1111';
      ctx.beginPath();
      ctx.arc(-half * 0.1, -half * 0.4, 3.5, 0, Math.PI * 2);
      ctx.arc(half * 0.1, -half * 0.4, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.arc(-half * 0.22, -half * 0.33, 2, 0, Math.PI * 2);
      ctx.arc(half * 0.22, -half * 0.33, 2, 0, Math.PI * 2);
      ctx.fill();

      // Fangs
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-half * 0.06, -half * 0.5);
      ctx.lineTo(-half * 0.1, -half * 0.62);
      ctx.moveTo(half * 0.06, -half * 0.5);
      ctx.lineTo(half * 0.1, -half * 0.62);
      ctx.stroke();

      // Legs
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 2.8;
      ctx.lineCap = 'round';
      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 4; i++) {
          const phase = (i % 2 === 0) ? 1 : -1;
          const wave = Math.sin(frame) * 18 * phase;
          const waveY = Math.cos(frame) * 8 * phase;
          const aX = side * half * 0.28;
          const aY = -half * 0.2 + i * half * 0.18;
          const jX = aX + side * (half * 0.55 + Math.abs(wave) * 0.05);
          const jY = aY - half * 0.4 + waveY * 0.3;
          const fX = jX + side * (half * 0.35 + wave * 0.08);
          const fY = aY + half * 0.45 + waveY * 0.4;
          ctx.beginPath();
          ctx.moveTo(aX, aY);
          ctx.lineTo(jX, jY);
          ctx.lineTo(fX, fY);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function animate(time) {
      requestAnimationFrame(animate);
      const dt = (time - lastTime) / 1000;
      lastTime = time;
      if (dt > 0.5) return;

      if (faceLandmarker && video.readyState >= 2) {
        try {
          const r = faceLandmarker.detectForVideo(video, time);
          if (r.faceLandmarks && r.faceLandmarks.length > 0) landmarks = r.faceLandmarks;
        } catch(e) {}
      }

      ctx.clearRect(0, 0, w, h);

      if (!landmarks || !landmarks[0]) {
        ctx.fillStyle = '#0f0';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('looking for face...', w / 2, 30);
        return;
      }

      const zoneLM = getLM(ZONES[currentZone]);
      if (zoneLM) {
        targetX = zoneLM.x;
        targetY = zoneLM.y;
        if (currentZone === 'up') targetY -= 40;
      }

      if (spiderX === 0 && spiderY === 0) { spiderX = targetX; spiderY = targetY; }

      if (isDancing) {
        danceTimer += dt;
        const nose = getLM(ZONES.center);
        if (nose) {
          targetX = nose.x + Math.cos(danceTimer * 8) * 50;
          targetY = nose.y + Math.sin(danceTimer * 16) * 25;
        }
        if (danceTimer > 3) isDancing = false;
      }

      const dx = targetX - spiderX, dy = targetY - spiderY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 3) {
        isMoving = true;
        spiderX += dx * MOVE_SPEED;
        spiderY += dy * MOVE_SPEED;
        legTimer += dt * 14;
      } else {
        isMoving = false;
        legTimer += dt * 2;
      }
      legFrame = legTimer;

      let angle = 0;
      if (isSpinning) {
        spinAngle += dt * 10;
        angle = spinAngle;
        if (spinAngle > Math.PI * 8) isSpinning = false;
      } else if (isMoving && dist > 5) {
        angle = Math.atan2(dy, dx) + Math.PI / 2;
      }

      drawSpider(spiderX, spiderY, angle, legFrame);
    }

    // --- INIT ---
    try {
      statusEl.textContent = 'camera...';
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadeddata = r);
      w = canvas.width = video.videoWidth;
      h = canvas.height = video.videoHeight;

      statusEl.textContent = 'loading face model (5-10 sec)...';
      const fs = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm'
      );
      faceLandmarker = await FaceLandmarker.create(fs, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU'
        },
        runningMode: 'VIDEO',
        numFaces: 1,
      });

      statusEl.textContent = '🕷 tap buttons!';
      requestAnimationFrame(animate);
    } catch(e) {
      statusEl.textContent = 'error: ' + e.message;
    }
  </script>
</body>
</html>
