<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Spider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; touch-action: none; }
    video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    #buttons {
      position: absolute; bottom: 20px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px;
      z-index: 10; flex-wrap: wrap; padding: 0 10px;
    }
    button {
      background: rgba(0,255,255,0.2); color: #0ff; border: 1px solid #0ff;
      padding: 10px 16px; border-radius: 8px; font-size: 16px;
      font-family: monospace; cursor: pointer;
    }
    button:active { background: rgba(0,255,255,0.5); }
    #status {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      color: #0f0; font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 8px;
    }
    #progress {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #0ff; font-family: monospace; font-size: 18px; z-index: 20;
      background: rgba(0,0,0,0.8); padding: 20px 30px; border-radius: 12px;
      text-align: center; display: none;
    }
    #progress .bar { width: 200px; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; }
    #progress .fill { height: 100%; background: #0ff; border-radius: 3px; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">starting camera...</div>
  <div id="progress">
    loading face model...<br>
    <div class="bar"><div class="fill" id="progressFill"></div></div>
  </div>
  <div id="buttons">
    <button onclick="cmd('up')">↑ Up</button>
    <button onclick="cmd('left')">← Left</button>
    <button onclick="cmd('right')">Right →</button>
    <button onclick="cmd('down')">↓ Down</button>
    <button onclick="cmd('dance')">♪ Dance</button>
    <button onclick="cmd('spin')">↻ Spin</button>
  </div>

  <script type="module">
    import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/+esm';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');

    const SPIDER_SIZE = 55;
    const MOVE_SPEED = 0.1;

    // Face landmark zones
    const ZONES = {
      center: 1,    // nose tip
      up:     10,   // forehead
      down:   152,  // chin
      left:   234,  // left cheek
      right:  454,  // right cheek
    };

    let spiderX = 0, spiderY = 0;
    let targetX = 0, targetY = 0;
    let legFrame = 0, legTimer = 0;
    let isMoving = false;
    let isDancing = false, danceTimer = 0;
    let isSpinning = false, spinAngle = 0;
    let lastTime = 0;
    let w = 0, h = 0;
    let faceLandmarker = null;
    let landmarks = null;
    let currentZone = 'center';
    let idleTimer = 0;
    let idleLegWiggle = 0;

    function getLandmarkPos(index) {
      if (!landmarks || !landmarks[0]) return null;
      const lm = landmarks[0][index];
      if (!lm) return null;
      return { x: lm.x * w, y: lm.y * h };
    }

    // Expose cmd to global scope for onclick buttons
    window.cmd = function(action) {
      isDancing = false;
      isSpinning = false;
      idleTimer = 0;
      if (action === 'dance') {
        isDancing = true; danceTimer = 0;
      } else if (action === 'spin') {
        isSpinning = true; spinAngle = 0;
      } else {
        currentZone = action;
      }
    };

    function drawSpider(x, y, angle, frame) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      const s = SPIDER_SIZE, half = s / 2;

      // Shadow on face
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(3, 5, half * 0.5, half * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();

      // Abdomen (back body)
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.ellipse(0, half * 0.1, half * 0.45, half * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();

      // Abdomen pattern
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.ellipse(0, half * 0.15, half * 0.2, half * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();
      // Red hourglass marking
      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.ellipse(0, half * 0.18, half * 0.08, half * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cephalothorax (head)
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(0, -half * 0.3, half * 0.32, half * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();

      // Eyes — 2 big + 4 small
      ctx.fillStyle = '#ff1111';
      ctx.beginPath();
      ctx.arc(-half * 0.1, -half * 0.4, 3.5, 0, Math.PI * 2);
      ctx.arc(half * 0.1, -half * 0.4, 3.5, 0, Math.PI * 2);
      ctx.fill();
      // Eye shine
      ctx.fillStyle = '#ff6666';
      ctx.beginPath();
      ctx.arc(-half * 0.08, -half * 0.42, 1.5, 0, Math.PI * 2);
      ctx.arc(half * 0.12, -half * 0.42, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Small side eyes
      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.arc(-half * 0.22, -half * 0.33, 2, 0, Math.PI * 2);
      ctx.arc(half * 0.22, -half * 0.33, 2, 0, Math.PI * 2);
      ctx.arc(-half * 0.18, -half * 0.25, 1.5, 0, Math.PI * 2);
      ctx.arc(half * 0.18, -half * 0.25, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Chelicerae (fangs)
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-half * 0.06, -half * 0.5);
      ctx.lineTo(-half * 0.1, -half * 0.62);
      ctx.moveTo(half * 0.06, -half * 0.5);
      ctx.lineTo(half * 0.1, -half * 0.62);
      ctx.stroke();

      // Legs — 4 pairs, strong alternating gait animation
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 2.8;
      ctx.lineCap = 'round';

      // Alternating gait: legs 1,3 move together, 2,4 move together
      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 4; i++) {
          const phase = (i % 2 === 0) ? 1 : -1;
          const wave = Math.sin(frame) * 18 * phase;
          const waveY = Math.cos(frame) * 8 * phase;

          // Leg attachment point on body
          const attachX = side * half * 0.28;
          const attachY = -half * 0.2 + i * half * 0.18;

          // Coxa-femur joint (first bend, goes UP and OUT)
          const jointX = attachX + side * (half * 0.55 + Math.abs(wave) * 0.05);
          const jointY = attachY - half * 0.4 + waveY * 0.3;

          // Tarsus (foot, goes DOWN to surface)
          const footX = jointX + side * (half * 0.35 + wave * 0.08);
          const footY = attachY + half * 0.45 + waveY * 0.4;

          // Draw leg segments
          ctx.beginPath();
          ctx.moveTo(attachX, attachY);
          ctx.lineTo(jointX, jointY);
          ctx.lineTo(footX, footY);
          ctx.stroke();

          // Tiny foot dot
          ctx.fillStyle = '#111';
          ctx.beginPath();
          ctx.arc(footX, footY, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.restore();
    }

    function animate(time) {
      requestAnimationFrame(animate);
      const dt = (time - lastTime) / 1000;
      lastTime = time;
      if (dt > 0.5) return;

      // Face detection
      if (faceLandmarker && video.readyState >= 2) {
        const result = faceLandmarker.detectForVideo(video, time);
        if (result.faceLandmarks && result.faceLandmarks.length > 0) {
          landmarks = result.faceLandmarks;
        }
      }

      ctx.clearRect(0, 0, w, h);

      if (!landmarks || !landmarks[0]) {
        ctx.fillStyle = '#0f0';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('looking for face...', w / 2, 30);
        return;
      }

      // Get target from face landmarks
      const zoneLM = getLandmarkPos(ZONES[currentZone]);
      if (zoneLM) {
        targetX = zoneLM.x;
        targetY = zoneLM.y;
        if (currentZone === 'up') targetY -= 40; // offset above forehead landmark
      }

      // Init position
      if (spiderX === 0 && spiderY === 0) {
        spiderX = targetX;
        spiderY = targetY;
      }

      // Dance
      if (isDancing) {
        danceTimer += dt;
        const nose = getLandmarkPos(ZONES.center);
        if (nose) {
          targetX = nose.x + Math.cos(danceTimer * 8) * 50;
          targetY = nose.y + Math.sin(danceTimer * 16) * 25;
        }
        if (danceTimer > 3) isDancing = false;
      }

      // Move
      const dx = targetX - spiderX;
      const dy = targetY - spiderY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 3) {
        isMoving = true;
        spiderX += dx * MOVE_SPEED;
        spiderY += dy * MOVE_SPEED;
        legTimer += dt * 14;
      } else {
        isMoving = false;
        // Idle leg wiggle
        idleTimer += dt;
        legTimer += dt * 2;
      }
      legFrame = legTimer;

      // Rotation
      let angle = 0;
      if (isSpinning) {
        spinAngle += dt * 10;
        angle = spinAngle;
        if (spinAngle > Math.PI * 8) isSpinning = false;
      } else if (isMoving && dist > 5) {
        angle = Math.atan2(dy, dx) + Math.PI / 2;
      }

      drawSpider(spiderX, spiderY, angle, legFrame);
    }

    async function main() {
      try {
        // Camera
        statusEl.textContent = 'starting camera...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadeddata = r);

        w = canvas.width = video.videoWidth;
        h = canvas.height = video.videoHeight;

        statusEl.textContent = 'camera ok, loading face model...';

        // Show progress
        progressEl.style.display = 'block';
        progressFill.style.width = '10%';

        // Load MediaPipe
        const filesetResolver = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm'
        );
        progressFill.style.width = '50%';

        faceLandmarker = await FaceLandmarker.create(filesetResolver, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
            delegate: 'GPU'
          },
          runningMode: 'VIDEO',
          numFaces: 1,
        });
        progressFill.style.width = '100%';

        // Hide progress
        setTimeout(() => { progressEl.style.display = 'none'; }, 500);
        statusEl.textContent = '🕷 spider ready — tap buttons!';

        requestAnimationFrame(animate);
      } catch(e) {
        statusEl.textContent = 'error: ' + e.message;
        progressEl.style.display = 'none';
      }
    }

    main();
  </script>
</body>
</html>
