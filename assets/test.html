<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spider Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; touch-action: none; }
    video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    #buttons {
      position: absolute; bottom: 20px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px;
      z-index: 10; flex-wrap: wrap; padding: 0 10px;
    }
    button {
      background: rgba(0,255,255,0.2); color: #0ff; border: 1px solid #0ff;
      padding: 10px 16px; border-radius: 8px; font-size: 16px;
      font-family: monospace; cursor: pointer;
    }
    button:active { background: rgba(0,255,255,0.5); }
    #status {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      color: #0f0; font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 8px;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">starting camera...</div>
  <div id="buttons">
    <button onclick="cmd('up')">↑ Up</button>
    <button onclick="cmd('left')">← Left</button>
    <button onclick="cmd('right')">Right →</button>
    <button onclick="cmd('down')">↓ Down</button>
    <button onclick="cmd('dance')">♪ Dance</button>
    <button onclick="cmd('spin')">↻ Spin</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    const SPIDER_SIZE = 50;
    const MOVE_SPEED = 0.07;

    let spiderX = 0, spiderY = 0;
    let targetX = 0, targetY = 0;
    let legFrame = 0, legTimer = 0;
    let isMoving = false;
    let isDancing = false, danceTimer = 0;
    let isSpinning = false, spinAngle = 0;
    let lastTime = 0;
    let w = 0, h = 0;

    // Zones relative to screen center
    function getZone(zone) {
      const cx = w / 2, cy = h / 2;
      switch(zone) {
        case 'up':    return { x: cx, y: cy - h * 0.2 };
        case 'down':  return { x: cx, y: cy + h * 0.2 };
        case 'left':  return { x: cx - w * 0.25, y: cy };
        case 'right': return { x: cx + w * 0.25, y: cy };
        default:      return { x: cx, y: cy };
      }
    }

    function cmd(action) {
      isDancing = false;
      isSpinning = false;
      if (action === 'dance') {
        isDancing = true; danceTimer = 0;
      } else if (action === 'spin') {
        isSpinning = true; spinAngle = 0;
      } else {
        const z = getZone(action);
        targetX = z.x; targetY = z.y;
      }
    }

    function drawSpider(x, y, angle, frame) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      const s = SPIDER_SIZE, half = s / 2;

      // Body
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(0, 0, half * 0.5, half * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.beginPath();
      ctx.ellipse(0, -half * 0.35, half * 0.3, half * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(-half * 0.12, -half * 0.42, 3, 0, Math.PI * 2);
      ctx.arc(half * 0.12, -half * 0.42, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.arc(-half * 0.22, -half * 0.35, 2, 0, Math.PI * 2);
      ctx.arc(half * 0.22, -half * 0.35, 2, 0, Math.PI * 2);
      ctx.fill();

      // Legs
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      const legWave = Math.sin(frame * 0.5) * 8;
      const legAngles = [-0.9, -0.5, -0.15, 0.2];

      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 4; i++) {
          const wave = (i % 2 === 0 ? legWave : -legWave);
          const startX = side * half * 0.3;
          const startY = -half * 0.1 + i * half * 0.15;
          const midX = startX + side * half * 0.6;
          const midY = startY - half * 0.3 + wave * 0.3;
          const endX = midX + side * half * 0.4;
          const endY = midY + half * 0.5 + wave * 0.2;

          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.quadraticCurveTo(midX, midY - 10, midX, midY);
          ctx.quadraticCurveTo(midX + side * 5, midY + 10, endX, endY);
          ctx.stroke();
        }
      }

      // Abdomen mark
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath();
      ctx.ellipse(0, half * 0.15, half * 0.15, half * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function animate(time) {
      requestAnimationFrame(animate);
      const dt = (time - lastTime) / 1000;
      lastTime = time;
      if (dt > 0.5) return;

      ctx.clearRect(0, 0, w, h);

      if (isDancing) {
        danceTimer += dt;
        const cx = w / 2, cy = h / 2;
        targetX = cx + Math.cos(danceTimer * 6) * 60;
        targetY = cy + Math.sin(danceTimer * 12) * 30;
        if (danceTimer > 4) isDancing = false;
      }

      const dx = targetX - spiderX;
      const dy = targetY - spiderY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 2) {
        isMoving = true;
        spiderX += dx * MOVE_SPEED;
        spiderY += dy * MOVE_SPEED;
      } else {
        isMoving = false;
      }

      if (isMoving || isDancing) legTimer += dt * 12;
      legFrame = legTimer;

      let angle = 0;
      if (isSpinning) {
        spinAngle += dt * 8;
        angle = spinAngle;
        if (spinAngle > Math.PI * 6) isSpinning = false;
      } else if (isMoving) {
        angle = Math.atan2(dy, dx) + Math.PI / 2;
      }

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(spiderX + 3, spiderY + 5, SPIDER_SIZE * 0.4, SPIDER_SIZE * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();

      drawSpider(spiderX, spiderY, angle, legFrame);
    }

    async function main() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadeddata = r);

        w = canvas.width = video.videoWidth;
        h = canvas.height = video.videoHeight;

        spiderX = w / 2;
        spiderY = h / 2;
        targetX = w / 2;
        targetY = h / 2;

        statusEl.textContent = '🕷 tap buttons to move';
        requestAnimationFrame(animate);
      } catch(e) {
        statusEl.textContent = 'error: ' + e.message;
      }
    }

    main();
  </script>
</body>
</html>
